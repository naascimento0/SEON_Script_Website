<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Arquivo .asta</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #output { margin-top: 20px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
<h1>Gerar Rede de Ontologias</h1>
<p>Faça upload do arquivo .asta para gerar a rede de ontologias:</p>
<input type="file" id="astaFile" accept=".asta">
<button onclick="uploadFile()">Processar</button>
<div id="output"></div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('astaFile');
        const outputDiv = document.getElementById('output');
        const file = fileInput.files[0];

        if (!file || !file.name.endsWith('.asta')) {
            outputDiv.innerHTML = '<p class="error">Por favor, selecione um arquivo .asta válido.</p>';
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        outputDiv.innerHTML = '<p>Processando...</p>';

        try {
            const response = await fetch('https://seu-backend-url/upload-asta', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                outputDiv.innerHTML = `<p class="error">Erro: ${errorText}</p>`;
                return;
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'seon_pages.zip';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

            outputDiv.innerHTML = '<p class="success">Arquivo processado com sucesso! Download iniciado.</p>';
        } catch (error) {
            outputDiv.innerHTML = `<p class="error">Erro ao enviar o arquivo: ${error.message}</p>`;
        }
    }
</script>
</body>
</html>
