<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>SEON - Login</title>
    <!-- Favicon -->
    <link rel="icon" href="/images/favicon.svg" sizes="32x32" type="image/svg">
    <!-- CDN from Bootstrap website -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- SEON Custom Theme -->
    <link rel="stylesheet" href="/css/seon-theme.css">

    <!-- Login page specific styles -->
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, rgba(212, 237, 218, 0.1) 100%);
            min-height: 100vh;
        }

        /* Login specific styles */
        .login-container {
            min-height: calc(100vh - var(--navbar-height) - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: linear-gradient(135deg, #ffffff 0%, rgba(212, 237, 218, 0.1) 100%);
            border: 2px solid var(--mid-green);
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(21, 87, 36, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(21, 87, 36, 0.05) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.3s ease;
        }

        .login-card:hover::before {
            transform: scale(1);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(21, 87, 36, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .login-header h1 {
            color: var(--dark-green);
            margin-bottom: 0.5rem;
        }

        .login-header .lead {
            color: var(--text-muted-green);
        }

        .login-icon {
            font-size: 4rem;
            color: var(--dark-green);
            margin-bottom: 1rem;
        }

        .form-control {
            border: 2px solid var(--mid-green);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .form-control:focus {
            border-color: var(--dark-green);
            box-shadow: 0 0 0 0.2rem rgba(21, 87, 36, 0.25);
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-green);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--dark-green), #0d3c17);
            border: none;
            color: white !important;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            width: 100%;
            z-index: 2;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #0d3c17, #0a2f14);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(21, 87, 36, 0.3);
            color: white !important;
        }

        .btn-login:focus {
            color: white !important;
            box-shadow: 0 0 0 0.2rem rgba(21, 87, 36, 0.25);
        }

        .btn-login:active {
            color: white !important;
        }

        .alert {
            border-radius: 8px;
            border: 2px solid;
            font-weight: 500;
            position: relative;
            z-index: 2;
        }

        .alert-danger {
            background: linear-gradient(135deg, #f8d7da, rgba(245, 198, 203, 0.8));
            border-color: #f5c6cb;
            color: #721c24;
        }

        .alert-success {
            background: linear-gradient(135deg, #d4edda, rgba(195, 230, 203, 0.8));
            border-color: #c3e6cb;
            color: #155724;
        }

        .input-group {
            position: relative;
            z-index: 2;
        }

        .input-group .form-control {
            border-right: none;
        }

        .input-group-text {
            background: var(--light-green);
            border: 2px solid var(--mid-green);
            border-left: none;
            color: var(--dark-green);
        }

        .form-control:focus + .input-group-text {
            border-color: var(--dark-green);
        }

        /* Loading spinner */
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
    </style>
</head>

<body>
<header th:replace="~{fragments/layout :: navbar(activePage='login')}"></header>

<div class="container-fluid">
    <div class="login-container">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-4">
                <div class="login-card">
                    <div class="login-header">
                        <i class="bi bi-shield-lock login-icon"></i>
                        <h1 class="display-6">Login Required</h1>
                        <p class="lead">Please authenticate to access SEON Upload feature</p>
                    </div>

                    <!-- Mensagens de erro/sucesso -->
                    <div th:if="${param.error}" class="alert alert-danger mb-3">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <strong>Authentication Failed!</strong> Invalid username or password.
                    </div>
                    
                    <div th:if="${param.logout}" class="alert alert-success mb-3">
                        <i class="bi bi-check-circle me-2"></i>
                        <strong>Logout Successful!</strong> You have been logged out.
                    </div>

                    <!-- Formulário de login -->
                    <form th:action="@{/login}" method="post" id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person me-2"></i>Username
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="username" name="username" 
                                       placeholder="Enter your username" required>
                                <span class="input-group-text">
                                    <i class="bi bi-person-fill"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock me-2"></i>Password
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="Enter your password" required>
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login" id="loginBtn">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            <span id="loginText">Sign In</span>
                        </button>
                    </form>

                    <!-- Informações adicionais -->
                    <div class="text-center mt-4">
                        <small class="text-muted">
                            <i class="bi bi-info-circle me-1"></i>
                            Use your SEON credentials to access the upload functionality
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const navbar = document.querySelector('.navbar');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');

        // Efeito de scroll na navbar
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Loading state no formulário
        loginForm.addEventListener('submit', function() {
            loginBtn.disabled = true;
            loginText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';
        });

        // Focus automático no campo username
        document.getElementById('username').focus();

        // Enter key navigation
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('password').focus();
            }
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.submit();
            }
        });
    });
</script>
</body>
</html>
