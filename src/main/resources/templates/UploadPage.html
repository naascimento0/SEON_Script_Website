<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>SEON - Upload</title>
    <!-- CSRF Token for secure AJAX requests -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <!-- Favicon -->
    <link rel="icon" href="/images/favicon.svg" sizes="32x32" type="image/svg">
    <!-- CDN from Bootstrap website -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- SEON Custom Theme -->
    <link rel="stylesheet" href="/css/seon-theme.css">

    <!-- Upload page specific styles -->
    <style>
        /* Upload specific styles melhorados */
        .upload-area {
            border: 3px dashed var(--mid-green);
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #f8f9fa 0%, rgba(212, 237, 218, 0.1) 100%);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(21, 87, 36, 0.05) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.3s ease;
        }

        .upload-area:hover::before,
        .upload-area.dragover::before {
            transform: scale(1);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--dark-green);
            background: linear-gradient(135deg, var(--light-green) 0%, rgba(195, 230, 203, 0.3) 100%);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(21, 87, 36, 0.15);
        }

        .upload-area h3 {
            position: relative;
            z-index: 2;
        }

        .upload-area p {
            position: relative;
            z-index: 2;
        }

        .upload-area i {
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .upload-area:hover i,
        .upload-area.dragover i {
            transform: scale(1.2);
            color: var(--dark-green) !important;
        }

        .btn-upload {
            background: linear-gradient(135deg, var(--dark-green), #0d3c17);
            border: none;
            color: white !important;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-upload::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-upload:hover::before {
            left: 100%;
        }

        .btn-upload:hover {
            background: linear-gradient(135deg, #0d3c17, #0a2f14);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(21, 87, 36, 0.3);
            color: white !important;
        }

        .btn-upload:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            color: white !important;
        }

        .btn-upload:focus {
            color: white !important;
            box-shadow: 0 0 0 0.2rem rgba(21, 87, 36, 0.25);
        }

        .btn-upload:active {
            color: white !important;
        }

        .success {
            color: #155724;
            background: linear-gradient(135deg, #d4edda, rgba(195, 230, 203, 0.8));
            border: 2px solid #c3e6cb;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(21, 87, 36, 0.1);
        }

        .error {
            color: #721c24;
            background: linear-gradient(135deg, #f8d7da, rgba(245, 198, 203, 0.8));
            border: 2px solid #f5c6cb;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(114, 28, 36, 0.1);
        }

        .alert {
            border-radius: 8px;
            border: 2px solid;
            font-weight: 500;
        }

        .alert-info {
            background: linear-gradient(135deg, #d1ecf1, rgba(209, 236, 241, 0.8));
            border-color: #bee5eb;
            color: #0c5460;
        }
    </style>
</head>

<body>
<header th:replace="~{fragments/layout :: navbar(activePage='upload')}"></header>

<div class="container-fluid">
    <div class="row">
        <!-- Conteúdo Principal -->
        <main role="main" class="col">
            <section class="bg-light p-5 rounded mb-4">
                <h1 class="display-4"><i class="bi bi-cloud-upload me-3"></i>Upload Astah File</h1>
                <p class="lead">Upload your .asta file to generate SEON Pages</p>
                <hr class="my-4">
                
                <!-- Upload Area -->
                <div class="upload-area mb-4" id="uploadArea">
                    <i class="bi bi-cloud-upload" style="font-size: 4rem; color: var(--dark-green);"></i>
                    <h3 class="mt-3">Drag and drop your .asta file here</h3>
                    <p class="text-muted">or click to select a file</p>
                    <input type="file" id="fileInput" accept=".asta" style="display: none;">
                    <button type="button" class="btn btn-upload mt-3" onclick="document.getElementById('fileInput').click()">
                        <i class="bi bi-folder2-open me-2"></i>Choose File
                    </button>
                </div>

                <!-- Selected File Info -->
                <div id="fileInfo" class="mb-3" style="display: none;">
                    <div class="alert alert-info">
                        <i class="bi bi-file-earmark me-2"></i>
                        <strong>Selected file:</strong> <span id="fileName"></span>
                    </div>
                </div>

                <!-- Upload Button -->
                <div class="text-center mb-4">
                    <button type="button" class="btn btn-upload btn-lg" id="uploadBtn" onclick="uploadFile()" disabled>
                        <i class="bi bi-upload me-2"></i>Upload and Process
                    </button>
                </div>

                <!-- Output -->
                <div id="output" class="mt-4"></div>
            </section>
        </main>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
</script>

<script>
    let selectedFile = null;

    // Efeito de scroll na navbar
    window.addEventListener('scroll', function() {
        const navbar = document.querySelector('.navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    // File input change handler
    document.getElementById('fileInput').addEventListener('change', function(e) {
        handleFileSelection(e.target.files[0]);
    });

    // Drag and drop handlers
    const uploadArea = document.getElementById('uploadArea');
    
    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', function(e) {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFileSelection(files[0]);
        }
    });

    function handleFileSelection(file) {
        if (!file) return;

        if (!file.name.endsWith('.asta')) {
            showOutput('<p class="error"><i class="bi bi-exclamation-triangle me-2"></i>Please select a valid .asta file.</p>');
            return;
        }

        selectedFile = file;
        
        // Show file info
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileInfo').style.display = 'block';
        
        // Enable upload button
        document.getElementById('uploadBtn').disabled = false;
        
        // Clear any previous output
        document.getElementById('output').innerHTML = '';
    }

    async function uploadFile() {
        if (!selectedFile) {
            showOutput('<p class="error"><i class="bi bi-exclamation-triangle me-2"></i>Please select a file first.</p>');
            return;
        }

        const formData = new FormData();
        formData.append('file', selectedFile);

        showOutput('<div class="alert alert-info"><i class="bi bi-hourglass-split me-2"></i>Processing file, please wait...</div>');

        // Disable upload button during processing
        document.getElementById('uploadBtn').disabled = true;

        try {
            // CSRF token for Spring Security
            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            const response = await fetch('/upload-asta', {
                method: 'POST',
                body: formData,
                headers: {
                    [csrfHeader]: csrfToken
                }           
            });

            if (!response.ok) {
                const errorText = await response.text();
                showOutput(`<p class="error"><i class="bi bi-exclamation-triangle me-2"></i>Error: ${errorText}</p>`);
                return;
            }

            // Parse JSON response
            const result = await response.json();
            
            if (result.success) {
                showOutput(`<div class="alert alert-success">
                    <i class="bi bi-check-circle me-2"></i>
                    <strong>Success!</strong> ${result.message}
                    <br><small class="text-muted">Processed at: ${new Date(result.timestamp).toLocaleString()}</small>
                </div>`);
            } else {
                showOutput(`<div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <strong>Error:</strong> ${result.message}
                </div>`);
            }
        } catch (error) {
            if (error instanceof TypeError && error.message.includes('fetch')) {
                showServerWarning();
            } else {
                showOutput(`<p class="error"><i class="bi bi-exclamation-triangle me-2"></i>Error uploading the file: ${error.message}</p>`);
            }
        } finally {
            // Re-enable upload button
            document.getElementById('uploadBtn').disabled = false;
        }
    }

    function showServerWarning() {
        const warningHtml = `
            <div class="alert alert-warning">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>Server Connection Warning:</strong> 
                Unable to connect to the upload server. Please ensure the server is running on port 8080.
            </div>
        `;
        showOutput(warningHtml);
    }

    function showOutput(html) {
        document.getElementById('output').innerHTML = html;
    }
</script>
</body>
</html>
